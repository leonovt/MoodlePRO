services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moodlepro
      POSTGRES_PASSWORD: moodlepro
      POSTGRES_DB: moodlepro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build: ./server
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://moodlepro:moodlepro@postgres:5432/moodlepro
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - server_storage:/app/data
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  server_storage:
